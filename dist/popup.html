<!doctype html>
<html>
  <head>
    <style>
      body {
        width: 240px;
        padding: 12px;
        font-family: Arial;
      }
      h3 {
        margin-top: 0;
      }
      .checkbox-label {
        display: block;
        margin: 10px 0;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <h3>Fox ESS Cloud V2 Controls</h3>
    <label class="checkbox-label">
      <input id="unstackCharts" type="checkbox" style="margin-right: 8px" />
      Unstack charts
    </label>
    <label class="checkbox-label">
      <input
        id="showSankey"
        type="checkbox"
        checked
        style="margin-right: 8px"
      />
      Show Sankey diagram
    </label>
    <div
      style="margin-top: 16px; padding-top: 12px; border-top: 1px solid #ddd"
    >
      <strong>Solar production gauge</strong>
      <label class="checkbox-label">
        <input
          id="showSolarGauge"
          type="checkbox"
          checked
          style="margin-right: 8px"
        />
        Show solar production gauge
      </label>
      <div style="margin-left: 12px">
        <label class="checkbox-label">
          <input
            id="showSolarCapacity"
            type="checkbox"
            checked
            style="margin-right: 8px"
          />
          Total capacity
        </label>
        <label class="checkbox-label">
          <input
            id="showSolarPercent"
            type="checkbox"
            checked
            style="margin-right: 8px"
          />
          Percent label
        </label>
        <label class="checkbox-label">
          <input
            id="showSolarHistory"
            type="checkbox"
            checked
            style="margin-right: 8px"
          />
          1min history graph
        </label>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
