<!doctype html>
<html>
  <head>
    <style>
      body {
        width: 240px;
        padding: 12px;
        font-family: Arial;
      }
      h3 {
        margin-top: 0;
      }
      .checkbox-label {
        display: block;
        margin: 10px 0;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <h3>Fox ESS Cloud V2 Controls</h3>
    <label class="checkbox-label">
      <input id="unstackCharts" type="checkbox" style="margin-right: 8px" />
      Unstack charts
    </label>
    <label class="checkbox-label">
      <input
        id="showSankey"
        type="checkbox"
        checked
        style="margin-right: 8px"
      />
      Show Sankey diagram
    </label>
    <label class="checkbox-label">
      <input
        id="showSolarGauge"
        type="checkbox"
        checked
        style="margin-right: 8px"
      />
      Show solar production gauge
    </label>
    <!-- <label class="checkbox-label">
      <input
        disabled
        id="showBatteryEstimate"
        type="checkbox"
        style="margin-right: 8px"
      />
      Show battery time estimate
    </label> -->

    <script src="popup.js"></script>
  </body>
</html>
